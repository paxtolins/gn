<!DOCTYPE html>
<html>
<head>
    <title>Content Index</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        a { display: block; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>Available Content</h1>
    <div id="links"></div>
    <script>
        // Create links to all your HTML files (0-741+)
        const container = document.getElementById('links');
        for(let i = 0; i <= 741; i++) {
            const link = document.createElement('a');
            link.href = `./${i}.html`;
            link.textContent = `Chapter ${i}`;
            container.appendChild(link);
        }
    </script>
</body>
</html>
